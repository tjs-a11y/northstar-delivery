<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>NorthStar Dispatch</title>

<style>

body{
background:#04080f;
color:white;
font-family:Arial;
padding:30px;
}

.job{
background:#101c30;
padding:15px;
margin-bottom:10px;
border-radius:8px;
}

button{
padding:6px 10px;
margin-right:6px;
}

</style>

</head>

<body>

<h2>Dispatch Board</h2>

<div id="jobs"></div>

<script>

let drivers = [

{ name:"Lance", city:"stlouis", status:"available", queue:[] },
{ name:"Myeisha", city:"stlouis", status:"available", queue:[] },
{ name:"Adrian", city:"pittsburgh", status:"available", queue:[] }

];

function loadJobs(){

let job = JSON.parse(localStorage.getItem("job_pending"));

if(!job) return;

let container = document.getElementById("jobs");

container.innerHTML = `
<div class="job">

Pickup: ${job.pickup}<br>
Dropoff: ${job.drop}<br>
Miles: ${job.miles}<br>
Price: $${job.price.toFixed(2)}<br>

<button onclick="assign()">Assign Driver</button>

</div>
`;

}

function scoreDriver(driver,job){

let score = 0;

if(driver.status === "available") score += 40;

if(driver.queue.length < 3) score += 20;

score += (3-driver.queue.length)*5;

return score;

}

function assign(){

let job = JSON.parse(localStorage.getItem("job_pending"));

let bestDriver = null;
let bestScore = -1;

drivers.forEach(driver => {

let s = scoreDriver(driver,job);

if(s > bestScore){
bestScore = s;
bestDriver = driver;
}

});

bestDriver.queue.push(job);

alert("Assigned to "+bestDriver.name);

renderDriverQueues();

}

function renderDriverQueues(){

let container = document.getElementById("jobs");

container.innerHTML = "";

drivers.forEach(d=>{

let q = "";

d.queue.forEach((j,i)=>{

q += `
<div class="job">
<b>${d.name}</b><br>
Stop ${i+1}<br>
Pickup: ${j.pickup}<br>
Dropoff: ${j.drop}<br>
Driver Pay: $${j.driverPay.toFixed(2)}

<button onclick="accept('${d.name}',${i})">Accept</button>

</div>
`;

});

container.innerHTML += q;

});

}

function accept(driverName,index){

drivers.forEach(d=>{

if(d.name === driverName){

alert(driverName+" accepted job");

}

});

}

loadJobs();

</script>

</body>
</html>
