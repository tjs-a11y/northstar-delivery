<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NorthStar Dispatch</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial, Helvetica, sans-serif;
background:#f4f4f4;
margin:0;
padding:0;
text-align:center;
}

header{
background:#0b3d91;
color:white;
padding:20px;
font-size:24px;
}

.container{
margin-top:40px;
}

button{
padding:12px 18px;
margin:8px;
border:none;
border-radius:6px;
cursor:pointer;
font-size:16px;
}

.admin-btn{background:#222;color:white;}
.driver-btn{background:#0b3d91;color:white;}
.client-btn{background:#444;color:white;}

input,select{
width:260px;
padding:10px;
margin:10px;
border-radius:6px;
border:1px solid #ccc;
}

#driverLogin{
margin-top:20px;
display:none;
}

</style>

</head>

<body>

<header>
NorthStar  
<br>
DISPATCH & PORTAL
</header>

<div class="container">

<button class="admin-btn">🏢 Admin</button>
<button class="driver-btn" onclick="showDriver()">🚗 Driver</button>
<button class="client-btn">🏬 Client</button>

<div id="driverLogin">

<br>

<input id="driverName" placeholder="Your Name">

<br>

<select id="driverSelect">
<option value="">Select driver...</option>
</select>

<br>

<input id="driverPin" type="password" maxlength="4" placeholder="Enter Your PIN">

<br>

<button id="driverLoginBtn">Login</button>

<br>

<div id="driverLoginMsg"></div>

</div>

</div>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

function showDriver(){
document.getElementById("driverLogin").style.display="block";
}


/* SUPABASE CONNECTION */

const SUPABASE_URL = "https://imljjaurxiawfxjckkqf.supabase.co";
const SUPABASE_ANON_KEY ="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImltbGpqYXVyeGlhd2Z4amNra3FmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxOTk1ODMsImV4cCI6MjA4ODc3NTU4M30.Qx0cxOGsndpJyJyhtTxN3qjua1j7meDMfav5WknNP5Y ";

const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);


/* LOAD DRIVER LIST */

async function loadDrivers(){

const driverSelect = document.getElementById("driverSelect");

driverSelect.innerHTML = '<option value="">Loading drivers...</option>';

const { data, error } = await supabase.rpc("get_driver_list");

if(error){

driverSelect.innerHTML = '<option value="">Unable to load drivers</option>';
return;

}

driverSelect.innerHTML = '<option value="">Select driver...</option>';

data.forEach(driver => {

const option = document.createElement("option");

option.value = driver.id;
option.textContent = driver.full_name + " (" + driver.city + ")";

driverSelect.appendChild(option);

});

}


/* DRIVER LOGIN */

async function loginDriver(){

const driverSelect = document.getElementById("driverSelect");
const driverPin = document.getElementById("driverPin");
const msg = document.getElementById("driverLoginMsg");

const driverId = driverSelect.value;
const pin = driverPin.value.trim();

msg.innerHTML="";

if(!driverId){
msg.innerHTML="Select your name";
return;
}

if(!pin){
msg.innerHTML="Enter your PIN";
return;
}

if(pin.length !== 4){
msg.innerHTML="PIN must be 4 digits";
return;
}

const { data, error } = await supabase.rpc("driver_pin_login",{
p_driver_id: driverId,
p_pin: pin
});

if(error || !data || data.length === 0){

msg.innerHTML="Invalid PIN";
return;

}

msg.style.color="green";
msg.innerHTML="Login successful";

localStorage.setItem("northstar_driver_session", JSON.stringify(data[0]));

}


/* EVENT LISTENERS */

document.addEventListener("DOMContentLoaded", () => {

loadDrivers();

document
.getElementById("driverLoginBtn")
.addEventListener("click", loginDriver);

});

</script>

</body>
</html>
