<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NorthStar Dispatch</title>

<style>

body{
font-family:Arial,Helvetica,sans-serif;
background:#0b0f18;
color:white;
margin:0;
padding:0;
}

header{
background:#121826;
padding:18px 24px;
font-size:20px;
font-weight:bold;
border-bottom:1px solid rgba(255,255,255,0.08);
}

.container{
padding:24px;
}

h2{
margin-top:0;
}

.board{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:20px;
}

.column{
background:#151b2a;
padding:18px;
border-radius:10px;
}

.job{
background:#0f1420;
border:1px solid rgba(255,255,255,0.06);
padding:14px;
margin-bottom:12px;
border-radius:8px;
}

button{
background:#1d6feb;
border:none;
color:white;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
margin-top:6px;
}

button:hover{
background:#2d83ff;
}

select{
width:100%;
margin-top:6px;
padding:6px;
background:#0f1420;
color:white;
border:1px solid rgba(255,255,255,0.08);
border-radius:6px;
}

</style>
</head>

<body>

<header>
NorthStar Dispatch
</header>

<div class="container">

<div class="board">

<div class="column">
<h2>New Jobs</h2>
<div id="pending"></div>
</div>

<div class="column">
<h2>Assigned</h2>
<div id="assigned"></div>
</div>

<div class="column">
<h2>Completed</h2>
<div id="done"></div>
</div>

</div>

</div>

<script>

function load(key,def){
try{
return JSON.parse(localStorage.getItem(key)) || def
}catch{
return def
}
}

function save(key,data){
localStorage.setItem(key,JSON.stringify(data))
}

let jobs=load("ns_jobs",[])
let drivers=load("ns_drivers",[])

if(!drivers.length){

drivers=[
{id:"d1",name:"Lance Murphy",city:"stlouis"},
{id:"d2",name:"Myeisha James",city:"stlouis"},
{id:"d3",name:"Sharitha Dixon",city:"chicago"},
{id:"d4",name:"Sandra Castillo",city:"chicago"},
{id:"d5",name:"Chris Allen",city:"atlanta"},
{id:"d6",name:"Skye Coles",city:"atlanta"},
{id:"d7",name:"Trina Smith",city:"atlanta"},
{id:"d8",name:"Mannie Johnson",city:"charlotte"},
{id:"d9",name:"Saul Rubio",city:"chicago"}
]

save("ns_drivers",drivers)

}

function render(){

document.getElementById("pending").innerHTML=""
document.getElementById("assigned").innerHTML=""
document.getElementById("done").innerHTML=""

jobs.forEach(j=>{

let el=document.createElement("div")
el.className="job"

el.innerHTML=`

<b>${j.customerName}</b><br>
${j.pickup}<br>
➡ ${j.delivery}<br>
$${j.price}

`

if(j.status==="pending"){

let select=document.createElement("select")

drivers
.filter(d=>d.city===j.city)
.forEach(d=>{
let o=document.createElement("option")
o.value=d.id
o.textContent=d.name
select.appendChild(o)
})

let btn=document.createElement("button")
btn.textContent="Assign Driver"

btn.onclick=()=>{

j.driverId=select.value
j.status="assigned"

save("ns_jobs",jobs)
render()

}

el.appendChild(select)
el.appendChild(btn)

document.getElementById("pending").appendChild(el)

}

else if(j.status==="assigned"){

let btn=document.createElement("button")
btn.textContent="Mark Delivered"

btn.onclick=()=>{

j.status="delivered"

save("ns_jobs",jobs)
render()

}

el.appendChild(btn)

document.getElementById("assigned").appendChild(el)

}

else{

document.getElementById("done").appendChild(el)

}

})

}

render()

</script>

</body>
</html>
