<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NorthStar Delivery — Instant Courier Quotes</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #0f172a;
  color: white;
}
.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}
.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 20px;
}
input, select {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
}
button {
  width: 100%;
  padding: 14px;
  margin-top: 15px;
  border: none;
  border-radius: 8px;
  background: #22c55e;
  color: black;
  font-weight: bold;
  cursor: pointer;
}
button:hover {
  background: #16a34a;
}
.price {
  font-size: 28px;
  font-weight: bold;
  margin-top: 15px;
}
.cta {
  background: #3b82f6;
  color: white;
}
</style>
</head>

<body>
<div class="container">

<h1>🚚 NorthStar Delivery</h1>
<p>Fast, reliable courier service with instant pricing.</p>

<div class="card">
<h2>Get Instant Quote</h2>

<select id="city">
  <option value="">Select City</option>
  <option value="charlotte">Charlotte</option>
  <option value="atlanta">Atlanta</option>
  <option value="chicago">Chicago</option>
</select>

<select id="service">
  <option value="">Service Type</option>
  <option value="standard">Standard</option>
  <option value="express">Express</option>
</select>

<input type="number" id="miles" placeholder="Estimated miles">
<input type="number" id="stops" placeholder="Number of stops">

<button id="quoteBtn">Get Price</button>

<div class="price" id="price">$0.00</div>

<button class="cta" id="bookBtn">Book This Delivery</button>

</div>

<div class="card">
<h2>Track Package</h2>
<input type="text" id="tracking" placeholder="Enter tracking number">
<button onclick="track()">Track</button>
<div id="trackingResult"></div>
</div>

</div>

<script>
const PRICING = {
  charlotte: { standard: 0.85, express: 1.2 },
  atlanta: { standard: 0.9, express: 1.3 },
  chicago: { standard: 1.0, express: 1.5 }
};

function calculate() {
  const city = document.getElementById("city").value;
  const service = document.getElementById("service").value;
  const miles = parseFloat(document.getElementById("miles").value) || 0;
  const stops = parseInt(document.getElementById("stops").value) || 0;
  const priceEl = document.getElementById("price");

  if (!city || !service) {
    priceEl.innerText = "$0.00";
    return;
  }

  const rate = PRICING[city][service];
  const stopFee = 5;

  const total = (miles * rate) + (stops * stopFee);

  priceEl.innerText = "$" + total.toFixed(2);
}

document.getElementById("quoteBtn").addEventListener("click", calculate);

["city","service","miles","stops"].forEach(id => {
  document.getElementById(id).addEventListener("input", calculate);
});

document.getElementById("bookBtn").addEventListener("click", () => {
  alert("Booking request submitted! We will contact you shortly.");
});

function track() {
  const input = document.getElementById("tracking").value;
  const result = document.getElementById("trackingResult");

  if (!input) {
    result.innerText = "Please enter a tracking number.";
    return;
  }

  result.innerText = "Tracking #" + input + ": In Transit 🚚";
}
</script>

</body>
</html>
