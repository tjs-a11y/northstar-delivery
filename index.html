<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NorthStar Delivery Request</title>
<style>

body{
font-family:Arial;
background:#0c1424;
color:white;
padding:40px;
}

.container{
max-width:700px;
margin:auto;
background:#101c30;
padding:30px;
border-radius:12px;
}

input,select{
width:100%;
padding:10px;
margin-top:8px;
margin-bottom:20px;
}

button{
background:#1d6feb;
color:white;
border:none;
padding:12px;
cursor:pointer;
width:100%;
}

h2{
margin-bottom:20px;
}

</style>
</head>

<body>

<div class="container">

<h2>Schedule Pickup</h2>

<label>Pickup City</label>
<input id="pickup">

<label>Dropoff City</label>
<input id="drop">

<label>Total Miles</label>
<input id="miles" type="number">

<label>Stops</label>
<input id="stops" type="number" value="1">

<button onclick="calculate()">Calculate Price</button>

<div id="priceBox"></div>

</div>

<script>

const stripeLink = "https://buy.stripe.com/cNi7sN1jpgBtgnT9j92Fa00";

function fuelSurcharge(price){
return price * 0.06;
}

function progressiveDriverPercent(price){

if(price <= 120) return 0.70;
if(price <= 180) return 0.65;
if(price <= 250) return 0.60;

return 0.55;

}

function calculate(){

let miles = Number(document.getElementById("miles").value);
let stops = Number(document.getElementById("stops").value);

let base = miles * 1.25 + stops * 10;

let fuel = fuelSurcharge(base);

let total = base + fuel;

let driverPercent = progressiveDriverPercent(total);

let driverPay = total * driverPercent;

let companyProfit = total - driverPay;

document.getElementById("priceBox").innerHTML = `

<h3>Total Price: $${total.toFixed(2)}</h3>

<p>Fuel surcharge included.</p>

<p style="color:orange">Payment required before dispatch.</p>

<button onclick="pay()">Pay Now</button>

`;

localStorage.setItem("job_pending", JSON.stringify({

pickup:document.getElementById("pickup").value,
drop:document.getElementById("drop").value,
miles:miles,
stops:stops,
price:total,
driverPay:driverPay

}));

}

function pay(){

window.open(stripeLink,"_blank");

alert("After payment, dispatch will assign a driver.");

}

</script>

</body>
</html>
